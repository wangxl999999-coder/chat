<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 阅后即焚</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-header">
            <div class="auth-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <h1 class="auth-title">阅后即焚</h1>
            <p class="auth-subtitle">安全私密的即时通信</p>
        </div>
        
        <div class="auth-form-container">
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">登录</div>
                <div class="auth-tab" data-tab="register">注册</div>
            </div>
            
            <!-- 登录表单 -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="login-phone" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="login-password" placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-block">登录</button>
                
                <div class="auth-footer">
                    <a href="javascript:void(0)" onclick="Auth.switchTab('sms-login')">验证码登录</a>
                </div>
            </form>
            
            <!-- 验证码登录表单 -->
            <form id="sms-login-form" class="auth-form">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="sms-login-phone" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="input-group">
                        <input type="text" class="form-input" id="sms-login-code" placeholder="请输入验证码" maxlength="6">
                        <button type="button" class="btn btn-sm btn-outline" id="sms-login-send-btn">获取验证码</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-block">登录</button>
                
                <div class="auth-footer">
                    <a href="javascript:void(0)" onclick="Auth.switchTab('login')">密码登录</a>
                </div>
            </form>
            
            <!-- 注册表单 -->
            <form id="register-form" class="auth-form">
                <div class="form-group" style="text-align: center;">
                    <label class="form-label">头像</label>
                    <div style="display: inline-block; position: relative;">
                        <div id="reg-avatar-preview" style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-color), #8b5cf6); display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; font-weight: 600; cursor: pointer; border: 3px solid var(--primary-light);">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 36px; height: 36px;">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="8.5" cy="7" r="4"></circle>
                                <line x1="20" y1="8" x2="20" y2="14"></line>
                                <line x1="23" y1="11" x2="17" y2="11"></line>
                            </svg>
                        </div>
                        <input type="file" id="reg-avatar-upload" accept="image/*" style="display: none;" onchange="Auth.handleAvatarUpload(this)">
                        <div style="position: absolute; bottom: 0; right: 0; width: 28px; height: 28px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white;" onclick="document.getElementById('reg-avatar-upload').click()">
                            <svg viewBox="0 0 24 24" fill="white" stroke="none" style="width: 16px; height: 16px;">
                                <path d="M12 4v16m8-8H4"></path>
                            </svg>
                        </div>
                    </div>
                    <div style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">点击上传头像（可选）</div>
                </div>
                <div class="form-group">
                    <label class="form-label">昵称</label>
                    <input type="text" class="form-input" id="reg-nickname" placeholder="请输入昵称（2-20个字符）">
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="reg-phone" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="input-group">
                        <input type="text" class="form-input" id="reg-code" placeholder="请输入验证码" maxlength="6">
                        <button type="button" class="btn btn-sm btn-outline" id="reg-send-btn">获取验证码</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="reg-password" placeholder="请输入密码（6-20个字符）">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-input" id="reg-confirm-password" placeholder="请再次输入密码">
                </div>
                <button type="submit" class="btn btn-block">注册</button>
                
                <div class="auth-footer">
                    <a href="javascript:void(0)" onclick="Auth.switchTab('login')">已有账号？立即登录</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/index.php';
        
        const Auth = {
            currentTab: 'login',
            codeTimer: null,
            smsCodeTimer: null,
            avatarBase64: '',
            
            init() {
                this.bindEvents();
            },
            
            handleAvatarUpload(input) {
                const file = input.files[0];
                if (!file) return;
                
                if (!file.type.startsWith('image/')) {
                    this.toast('请选择图片文件');
                    return;
                }
                
                if (file.size > 5 * 1024 * 1024) {
                    this.toast('图片大小不能超过5MB');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64 = e.target.result;
                    this.avatarBase64 = base64;
                    const preview = document.getElementById('reg-avatar-preview');
                    preview.style.backgroundImage = `url(${base64})`;
                    preview.style.backgroundSize = 'cover';
                    preview.style.backgroundPosition = 'center';
                    preview.innerHTML = '';
                };
                reader.readAsDataURL(file);
            },
            
            bindEvents() {
                // 标签切换
                document.querySelectorAll('.auth-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        this.switchTab(tab.dataset.tab);
                    });
                });
                
                // 登录表单
                document.getElementById('login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.login();
                });
                
                // 验证码登录表单
                document.getElementById('sms-login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.smsLogin();
                });
                
                // 注册表单
                document.getElementById('register-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.register();
                });
                
                // 获取注册验证码
                document.getElementById('reg-send-btn').addEventListener('click', () => {
                    this.sendCode('reg');
                });
                
                // 获取登录验证码
                document.getElementById('sms-login-send-btn').addEventListener('click', () => {
                    this.sendCode('sms-login');
                });
            },
            
            // 切换标签
            switchTab(tab) {
                this.currentTab = tab;
                
                // 更新标签状态
                document.querySelectorAll('.auth-tab').forEach(t => {
                    t.classList.toggle('active', t.dataset.tab === tab);
                });
                
                // 隐藏所有表单
                document.querySelectorAll('.auth-form').forEach(f => {
                    f.classList.remove('active');
                });
                
                // 显示目标表单
                let formId;
                switch (tab) {
                    case 'login':
                        formId = 'login-form';
                        break;
                    case 'sms-login':
                        formId = 'sms-login-form';
                        break;
                    case 'register':
                        formId = 'register-form';
                        break;
                }
                
                const form = document.getElementById(formId);
                if (form) {
                    form.classList.add('active');
                }
            },
            
            // 解析endpoint为查询参数 (如 '/auth/login' -> module=auth, action=login)
            parseEndpoint(endpoint) {
                const parts = endpoint.replace(/^\//, '').split('/');
                return {
                    module: parts[0] || '',
                    action: parts[1] || ''
                };
            },
            
            // API请求
            async api(endpoint, method = 'GET', data = null) {
                const { module, action } = this.parseEndpoint(endpoint);
                const url = API_BASE + '?module=' + module + '&action=' + action;
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                };
                
                if (data && method !== 'GET') {
                    options.body = JSON.stringify(data);
                }
                
                try {
                    const response = await fetch(url, options);
                    const result = await response.json();
                    return result;
                } catch (error) {
                    console.error('API请求失败:', error);
                    throw error;
                }
            },
            
            // 显示Toast
            toast(message, duration = 2000) {
                const existingToast = document.querySelector('.toast');
                if (existingToast) {
                    existingToast.remove();
                }
                
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, duration);
            },
            
            // 发送验证码
            async sendCode(type) {
                let phoneInput, btn;
                
                if (type === 'reg') {
                    phoneInput = document.getElementById('reg-phone');
                    btn = document.getElementById('reg-send-btn');
                } else {
                    phoneInput = document.getElementById('sms-login-phone');
                    btn = document.getElementById('sms-login-send-btn');
                }
                
                const phone = phoneInput.value.trim();
                
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    this.toast('请输入正确的手机号');
                    return;
                }
                
                // 禁用按钮并开始倒计时
                btn.disabled = true;
                let countdown = 60;
                btn.textContent = `${countdown}s`;
                
                const timer = setInterval(() => {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btn.disabled = false;
                        btn.textContent = '获取验证码';
                    } else {
                        btn.textContent = `${countdown}s`;
                    }
                }, 1000);
                
                // 存储timer引用
                if (type === 'reg') {
                    this.codeTimer = timer;
                } else {
                    this.smsCodeTimer = timer;
                }
                
                try {
                    const res = await this.api('/auth/send_code', 'POST', { phone });
                    if (res.success) {
                        this.toast('验证码已发送: ' + res.data.code); // 实际生产环境不要显示code
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('发送失败');
                }
            },
            
            // 密码登录
            async login() {
                const phone = document.getElementById('login-phone').value.trim();
                const password = document.getElementById('login-password').value;
                
                if (!phone || !password) {
                    this.toast('请填写完整信息');
                    return;
                }
                
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    this.toast('请输入正确的手机号');
                    return;
                }
                
                try {
                    const res = await this.api('/auth/login', 'POST', { phone, password });
                    if (res.success) {
                        this.toast('登录成功');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 500);
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('登录失败');
                }
            },
            
            // 验证码登录
            async smsLogin() {
                const phone = document.getElementById('sms-login-phone').value.trim();
                const code = document.getElementById('sms-login-code').value.trim();
                
                if (!phone || !code) {
                    this.toast('请填写完整信息');
                    return;
                }
                
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    this.toast('请输入正确的手机号');
                    return;
                }
                
                try {
                    const res = await this.api('/auth/login', 'POST', { phone, code });
                    if (res.success) {
                        this.toast('登录成功');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 500);
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('登录失败');
                }
            },
            
            // 注册
            async register() {
                const nickname = document.getElementById('reg-nickname').value.trim();
                const phone = document.getElementById('reg-phone').value.trim();
                const code = document.getElementById('reg-code').value.trim();
                const password = document.getElementById('reg-password').value;
                const confirmPassword = document.getElementById('reg-confirm-password').value;
                
                if (!nickname || !phone || !code || !password || !confirmPassword) {
                    this.toast('请填写完整信息');
                    return;
                }
                
                if (nickname.length < 2 || nickname.length > 20) {
                    this.toast('昵称长度应在2-20个字符之间');
                    return;
                }
                
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    this.toast('请输入正确的手机号');
                    return;
                }
                
                if (password.length < 6 || password.length > 20) {
                    this.toast('密码长度应在6-20个字符之间');
                    return;
                }
                
                if (password !== confirmPassword) {
                    this.toast('两次输入的密码不一致');
                    return;
                }
                
                const requestData = {
                    nickname,
                    phone,
                    code,
                    password
                };
                
                if (this.avatarBase64) {
                    requestData.avatar = this.avatarBase64;
                }
                
                try {
                    const res = await this.api('/auth/register', 'POST', requestData);
                    
                    if (res.success) {
                        this.toast('注册成功');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 500);
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('注册失败');
                }
            }
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            Auth.init();
        });
    </script>
</body>
</html>
