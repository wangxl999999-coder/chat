<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编辑资料</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button class="chat-back-btn" onclick="EditProfile.back()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h1>编辑资料</h1>
            <button class="header-btn" style="width: auto; padding: 0 12px;" onclick="EditProfile.save()">
                <span style="font-size: 15px; color: var(--primary-color); font-weight: 500;">保存</span>
            </button>
        </header>
        
        <div class="edit-form">
            <div class="edit-avatar">
                <div id="avatar-preview" class="user-avatar"></div>
                <input type="file" id="avatar-upload" accept="image/*" style="display: none;" onchange="EditPreview.uploadAvatar(this)">
                <span class="edit-avatar-btn" onclick="document.getElementById('avatar-upload').click()">更换头像</span>
            </div>
            
            <div class="profile-section" style="margin: 0; border-radius: 0;">
                <div class="edit-item">
                    <div class="edit-item-label">昵称</div>
                    <div class="edit-item-value">
                        <input type="text" id="edit-nickname" placeholder="请输入昵称" maxlength="20">
                    </div>
                </div>
                
                <div class="edit-item">
                    <div class="edit-item-label">号码</div>
                    <div class="edit-item-value" id="edit-number" style="color: var(--text-muted);"></div>
                </div>
                
                <div class="edit-item">
                    <div class="edit-item-label">性别</div>
                    <div class="edit-item-value">
                        <div class="gender-options">
                            <div class="gender-option" data-gender="0" onclick="EditProfile.selectGender(0)">保密</div>
                            <div class="gender-option" data-gender="1" onclick="EditProfile.selectGender(1)">男</div>
                            <div class="gender-option" data-gender="2" onclick="EditProfile.selectGender(2)">女</div>
                        </div>
                    </div>
                </div>
                
                <div class="edit-item">
                    <div class="edit-item-label">简介</div>
                    <div class="edit-item-value">
                        <input type="text" id="edit-bio" placeholder="介绍一下自己吧" maxlength="200">
                    </div>
                </div>
            </div>
            
            <div class="profile-section" style="margin-top: 16px;">
                <div class="profile-item" onclick="EditProfile.showChangePassword()">
                    <div class="profile-item-label">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <span class="profile-item-text">修改密码</span>
                    </div>
                    <div class="profile-item-value">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 修改密码弹窗 -->
    <div id="password-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: white; border-radius: 12px; width: 100%; max-width: 400px; padding: 24px;">
            <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 20px;">修改密码</h3>
            
            <div class="form-group">
                <label class="form-label">原密码</label>
                <input type="password" class="form-input" id="old-password" placeholder="请输入原密码">
            </div>
            
            <div class="form-group">
                <label class="form-label">新密码</label>
                <input type="password" class="form-input" id="new-password" placeholder="请输入新密码（6-20位）">
            </div>
            
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" class="form-input" id="confirm-new-password" placeholder="请再次输入新密码">
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="btn btn-block btn-secondary" onclick="EditProfile.hidePasswordModal()">取消</button>
                <button class="btn btn-block" onclick="EditProfile.changePassword()">确认</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/chat/api';
        
        const EditProfile = {
            currentUser: null,
            selectedGender: 0,
            
            async init() {
                // 检查登录状态
                const loggedIn = await this.checkLogin();
                if (!loggedIn) {
                    window.location.href = 'auth.html';
                    return;
                }
                
                // 填充表单
                this.fillForm();
            },
            
            async checkLogin() {
                try {
                    const res = await this.api('/auth/check_login');
                    if (res.success) {
                        this.currentUser = res.data;
                        return true;
                    }
                } catch (e) {
                    console.error('检查登录失败:', e);
                }
                return false;
            },
            
            async api(endpoint, method = 'GET', data = null) {
                const url = API_BASE + endpoint;
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                };
                
                if (data && method !== 'GET') {
                    options.body = JSON.stringify(data);
                }
                
                try {
                    const response = await fetch(url, options);
                    const result = await response.json();
                    return result;
                } catch (error) {
                    console.error('API请求失败:', error);
                    throw error;
                }
            },
            
            toast(message, duration = 2000) {
                const existingToast = document.querySelector('.toast');
                if (existingToast) {
                    existingToast.remove();
                }
                
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, duration);
            },
            
            fillForm() {
                const user = this.currentUser;
                
                // 头像
                const avatarPreview = document.getElementById('avatar-preview');
                if (user.avatar) {
                    avatarPreview.innerHTML = `<img src="${user.avatar}" class="avatar large" alt="头像">`;
                } else {
                    avatarPreview.innerHTML = `<div class="avatar large"><div class="avatar-placeholder">${(user.nickname || '用')[0].toUpperCase()}</div></div>`;
                }
                
                // 昵称
                document.getElementById('edit-nickname').value = user.nickname || '';
                
                // 号码
                document.getElementById('edit-number').textContent = user.user_number || '';
                
                // 性别
                this.selectGender(user.gender || 0);
                
                // 简介
                document.getElementById('edit-bio').value = user.bio || '';
            },
            
            selectGender(gender) {
                this.selectedGender = gender;
                document.querySelectorAll('.gender-option').forEach(option => {
                    option.classList.toggle('active', parseInt(option.dataset.gender) === gender);
                });
            },
            
            // 上传头像
            async uploadAvatar(input) {
                if (!input.files || !input.files[0]) return;
                
                const file = input.files[0];
                
                // 检查文件大小
                if (file.size > 5 * 1024 * 1024) {
                    this.toast('图片大小不能超过5MB');
                    return;
                }
                
                try {
                    const formData = new FormData();
                    formData.append('avatar', file);
                    
                    const response = await fetch(API_BASE + '/user/upload_avatar', {
                        method: 'POST',
                        credentials: 'include',
                        body: formData
                    });
                    
                    const res = await response.json();
                    
                    if (res.success) {
                        this.toast('头像上传成功');
                        // 更新当前用户信息
                        this.currentUser.avatar = res.data.url;
                        // 更新预览
                        const avatarPreview = document.getElementById('avatar-preview');
                        avatarPreview.innerHTML = `<img src="${res.data.url}" class="avatar large" alt="头像">`;
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('上传失败');
                }
            },
            
            // 保存资料
            async save() {
                const nickname = document.getElementById('edit-nickname').value.trim();
                const bio = document.getElementById('edit-bio').value.trim();
                
                // 验证昵称
                if (!nickname) {
                    this.toast('请输入昵称');
                    return;
                }
                
                if (nickname.length < 2 || nickname.length > 20) {
                    this.toast('昵称长度应在2-20个字符之间');
                    return;
                }
                
                // 构建更新数据
                const updateData = {
                    nickname,
                    gender: this.selectedGender
                };
                
                if (bio) {
                    updateData.bio = bio;
                }
                
                if (this.currentUser.avatar) {
                    updateData.avatar = this.currentUser.avatar;
                }
                
                try {
                    const res = await this.api('/user/update', 'POST', updateData);
                    if (res.success) {
                        this.toast('保存成功');
                        setTimeout(() => {
                            this.back();
                        }, 500);
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('保存失败');
                }
            },
            
            showChangePassword() {
                document.getElementById('password-modal').style.display = 'flex';
            },
            
            hidePasswordModal() {
                document.getElementById('password-modal').style.display = 'none';
                // 清空输入
                document.getElementById('old-password').value = '';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-new-password').value = '';
            },
            
            async changePassword() {
                const oldPassword = document.getElementById('old-password').value;
                const newPassword = document.getElementById('new-password').value;
                const confirmNewPassword = document.getElementById('confirm-new-password').value;
                
                if (!oldPassword || !newPassword || !confirmNewPassword) {
                    this.toast('请填写完整信息');
                    return;
                }
                
                if (newPassword.length < 6 || newPassword.length > 20) {
                    this.toast('密码长度应在6-20个字符之间');
                    return;
                }
                
                if (newPassword !== confirmNewPassword) {
                    this.toast('两次输入的新密码不一致');
                    return;
                }
                
                try {
                    const res = await this.api('/user/update_password', 'POST', {
                        old_password: oldPassword,
                        new_password: newPassword
                    });
                    
                    if (res.success) {
                        this.toast('密码修改成功');
                        this.hidePasswordModal();
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('修改失败');
                }
            },
            
            back() {
                window.location.href = 'index.html';
            }
        };
        
        // 别名，用于HTML中的onclick
        const EditPreview = EditProfile;
        
        document.addEventListener('DOMContentLoaded', () => {
            EditProfile.init();
        });
    </script>
</body>
</html>
