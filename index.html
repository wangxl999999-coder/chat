<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <title>阅后即焚 - 安全私密的即时通信</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 主内容区域 -->
        <main class="app-main" id="app-main">
            <!-- 会话页面 -->
            <div id="page-conversation" class="page-view active">
                <header class="app-header">
                    <h1>消息</h1>
                    <div class="header-actions">
                        <button class="header-btn" onclick="App.showAddMenu()" title="更多">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                </header>
                
                <!-- 搜索框 -->
                <div class="search-box">
                    <div class="search-box-inner" onclick="App.showSearchPage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" placeholder="搜索" readonly>
                    </div>
                </div>
                
                <!-- 会话列表 -->
                <div id="conversation-list">
                    <!-- 会话列表将通过JS动态添加 -->
                </div>
                
                <!-- 空状态 -->
                <div id="conversation-empty" class="empty-state" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <h3>暂无消息</h3>
                    <p>快去添加好友开始聊天吧</p>
                </div>
            </div>
            
            <!-- 通讯录页面 -->
            <div id="page-friend" class="page-view">
                <header class="app-header">
                    <h1>通讯录</h1>
                    <div class="header-actions">
                        <button class="header-btn" id="add-friend-btn" title="添加好友">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="8.5" cy="7" r="4"></circle>
                                <line x1="20" y1="8" x2="20" y2="14"></line>
                                <line x1="23" y1="11" x2="17" y2="11"></line>
                            </svg>
                        </button>
                    </div>
                </header>
                
                <!-- 好友申请入口 -->
                <div class="list-item" id="friend-requests-btn" style="cursor: pointer;">
                    <div style="width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary-color), #8b5cf6); border-radius: var(--radius-md);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </div>
                    <div class="list-item-content">
                        <div class="list-item-title">好友申请</div>
                    </div>
                    <div class="list-item-meta">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px; color: var(--text-muted);">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </div>
                
                <!-- 好友列表 -->
                <div id="friend-list">
                    <!-- 好友列表将通过JS动态添加 -->
                </div>
                
                <!-- 空状态 -->
                <div id="friend-empty" class="empty-state" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <h3>暂无好友</h3>
                    <p>点击右上角添加好友</p>
                </div>
            </div>
            
            <!-- 我的页面 -->
            <div id="page-profile" class="page-view">
                <!-- 用户信息头部 -->
                <div class="profile-header" id="edit-profile-btn" style="cursor: pointer;">
                    <div class="user-avatar" id="profile-avatar"></div>
                    <div class="profile-name" id="profile-name">用户</div>
                    <div class="profile-number">
                        账号: <span id="profile-number"></span>
                    </div>
                    <div class="profile-bio" id="profile-bio">这个人很懒，什么都没写</div>
                </div>
                
                <!-- 设置列表 -->
                <div class="profile-section">
                    <div class="profile-section-title">我的</div>
                    
                    <div class="profile-item" onclick="App.showEditProfile()">
                        <div class="profile-item-label">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                            <span class="profile-item-text">编辑资料</span>
                        </div>
                        <div class="profile-item-value">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <div class="profile-section">
                    <div class="profile-section-title">其他</div>
                    
                    <div class="profile-item">
                        <div class="profile-item-label">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                            <span class="profile-item-text">设置</span>
                        </div>
                        <div class="profile-item-value">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </div>
                    
                    <div class="profile-item">
                        <div class="profile-item-label">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                <line x1="12" y1="17" x2="12.01" y2="17"></line>
                            </svg>
                            <span class="profile-item-text">关于</span>
                        </div>
                        <div class="profile-item-value">
                            <span style="color: var(--text-muted);">v1.0.0</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <!-- 退出登录 -->
                <div style="padding: 0 16px; margin-top: 20px; margin-bottom: 30px;">
                    <button class="btn btn-block btn-danger" id="logout-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px; margin-right: 8px;">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        退出登录
                    </button>
                </div>
            </div>
        </main>
        
        <!-- 底部导航栏 -->
        <nav class="app-footer">
            <a href="javascript:void(0)" class="nav-item active" data-page="conversation">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>消息</span>
                <span class="nav-badge" style="display: none;">0</span>
            </a>
            
            <a href="javascript:void(0)" class="nav-item" data-page="friend">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span>通讯录</span>
            </a>
            
            <a href="javascript:void(0)" class="nav-item" data-page="profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>我的</span>
            </a>
        </nav>
    </div>
    
    <!-- 搜索页面 -->
    <div id="search-page" class="detail-page" style="display: none;">
        <header class="app-header">
            <button class="chat-back-btn" id="search-back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <div style="flex: 1; margin-left: 12px;">
                <div class="search-box-inner" style="height: 40px; background: var(--bg-secondary);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="搜索用户号码或昵称" autofocus>
                </div>
            </div>
            <div style="width: 50px;"></div>
        </header>
        
        <div class="search-results" id="search-results">
            <!-- 搜索结果将动态添加 -->
        </div>
    </div>
    
    <!-- 好友申请页面 -->
    <div id="friend-requests-page" class="detail-page" style="display: none;">
        <header class="app-header">
            <button class="chat-back-btn" id="requests-back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h1>好友申请</h1>
            <div style="width: 40px;"></div>
        </header>
        
        <div id="friend-requests-list">
            <!-- 好友申请列表将动态添加 -->
        </div>
    </div>
    
    <!-- 弹出菜单 -->
    <div id="popup-menu" class="popup-menu" style="display: none;">
        <div class="popup-menu-item" onclick="App.showSearchPage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            添加好友
        </div>
    </div>
    
    <script src="assets/js/app.js"></script>
</body>
</html>
