<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 阅后即焚</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* 管理后台额外样式 */
        .admin-container {
            display: flex;
            min-height: 100vh;
            background-color: var(--bg-secondary);
        }
        
        .admin-sidebar {
            width: 240px;
            background-color: var(--bg-primary);
            border-right: 1px solid var(--border-color);
            padding: 20px 0;
        }
        
        .admin-sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        
        .admin-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
        }
        
        .admin-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .admin-menu-item:hover {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .admin-menu-item.active {
            background-color: var(--primary-light);
            color: var(--primary-color);
            border-right: 3px solid var(--primary-color);
        }
        
        .admin-main {
            flex: 1;
            overflow-y: auto;
        }
        
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .admin-header h2 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .admin-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .admin-username {
            font-size: 14px;
            font-weight: 500;
        }
        
        .admin-content {
            padding: 24px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background-color: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }
        
        .stat-card-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        
        .stat-card-label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* 表格 */
        .data-table-wrapper {
            background-color: var(--bg-primary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            background-color: var(--bg-secondary);
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }
        
        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-primary);
            vertical-align: middle;
        }
        
        .data-table tr:last-child td {
            border-bottom: none;
        }
        
        .data-table tr:hover td {
            background-color: var(--bg-secondary);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 500;
            border-radius: var(--radius-full);
        }
        
        .status-badge.active {
            background-color: var(--primary-light);
            color: var(--primary-color);
        }
        
        .status-badge.disabled {
            background-color: #fef2f2;
            color: var(--danger-color);
        }
        
        /* 搜索和过滤 */
        .search-filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-filter-bar .form-input {
            max-width: 300px;
            height: 40px;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background-color: var(--bg-primary);
            border-radius: var(--radius-lg);
            margin-top: 16px;
        }
        
        .pagination-info {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .pagination-buttons {
            display: flex;
            gap: 8px;
        }
        
        .pagination-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }
        
        .pagination-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination-btn.active {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        
        /* 用户详情弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal {
            background-color: var(--bg-primary);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .modal-close:hover {
            background-color: var(--bg-tertiary);
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .detail-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            width: 100px;
            font-size: 14px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        
        .detail-value {
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
        }
        
        /* 操作按钮 */
        .action-btns {
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .action-btn.view {
            background-color: var(--primary-light);
            color: var(--primary-color);
        }
        
        .action-btn.view:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        .action-btn.toggle {
            background-color: var(--primary-light);
            color: var(--primary-color);
        }
        
        .action-btn.toggle:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        .action-btn.toggle.disable {
            background-color: #fef2f2;
            color: var(--danger-color);
        }
        
        .action-btn.toggle.disable:hover {
            background-color: var(--danger-color);
            color: white;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .admin-container {
                flex-direction: column;
            }
            
            .admin-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 10px 0;
            }
            
            .admin-sidebar-header {
                padding: 0 16px 10px;
                margin-bottom: 10px;
            }
            
            .admin-menu {
                display: flex;
                overflow-x: auto;
                padding: 0 8px;
            }
            
            .admin-menu-item {
                padding: 10px 14px;
                white-space: nowrap;
                border-right: none;
                border-bottom: 2px solid transparent;
            }
            
            .admin-menu-item.active {
                border-right: none;
                border-bottom: 2px solid var(--primary-color);
                background-color: transparent;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .data-table-wrapper {
                overflow-x: auto;
            }
            
            .data-table {
                min-width: 800px;
            }
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="admin-login-page" style="display: none;">
        <div class="auth-page">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </div>
                <h1 class="auth-title">管理后台</h1>
                <p class="auth-subtitle">阅后即焚即时通信</p>
            </div>
            
            <div class="auth-form-container">
                <form id="admin-login-form">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-input" id="admin-username" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="admin-password" placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn btn-block">登录</button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 管理后台主页面 -->
    <div id="admin-main-page" class="admin-container" style="display: none;">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <div class="admin-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    <span>管理后台</span>
                </div>
            </div>
            
            <div class="admin-menu">
                <div class="admin-menu-item active" data-menu="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>仪表盘</span>
                </div>
                <div class="admin-menu-item" data-menu="users">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span>用户管理</span>
                </div>
                <div class="admin-menu-item" data-menu="admins">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    <span>管理员</span>
                </div>
            </div>
        </aside>
        
        <!-- 主内容 -->
        <main class="admin-main">
            <header class="admin-header">
                <h2 id="page-title">仪表盘</h2>
                <div class="admin-user-info">
                    <span class="admin-username" id="admin-username-display">管理员</span>
                    <button class="btn btn-sm btn-secondary" onclick="Admin.logout()">退出</button>
                </div>
            </header>
            
            <div class="admin-content">
                <!-- 仪表盘页面 -->
                <div id="dashboard-page">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-card-value" id="stat-total-users">--</div>
                            <div class="stat-card-label">总用户数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-value" id="stat-disabled-users">--</div>
                            <div class="stat-card-label">禁用用户</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-value" id="stat-total-messages">--</div>
                            <div class="stat-card-label">消息总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-value" id="stat-total-friends">--</div>
                            <div class="stat-card-label">好友对数</div>
                        </div>
                    </div>
                    
                    <div class="data-table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>新注册用户</th>
                                </tr>
                            </thead>
                            <tbody id="stats-table-body">
                                <tr>
                                    <td colspan="2" style="text-align: center; color: var(--text-muted);">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- 用户管理页面 -->
                <div id="users-page" style="display: none;">
                    <div class="search-filter-bar">
                        <input type="text" class="form-input" id="user-search" placeholder="搜索用户号码、昵称、手机号...">
                        <select class="form-input" id="user-status-filter" style="width: 120px;">
                            <option value="-1">全部状态</option>
                            <option value="1">正常</option>
                            <option value="0">禁用</option>
                        </select>
                        <button class="btn btn-sm" onclick="Admin.searchUsers()">搜索</button>
                    </div>
                    
                    <div class="data-table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>用户号码</th>
                                    <th>昵称</th>
                                    <th>手机号</th>
                                    <th>性别</th>
                                    <th>状态</th>
                                    <th>注册时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body">
                                <tr>
                                    <td colspan="7" style="text-align: center; color: var(--text-muted);">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="pagination" id="users-pagination" style="display: none;">
                        <div class="pagination-info">共 <span id="users-total">0</span> 条</div>
                        <div class="pagination-buttons" id="users-pagination-buttons"></div>
                    </div>
                </div>
                
                <!-- 管理员页面 -->
                <div id="admins-page" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="font-size: 16px; font-weight: 600;">管理员列表</h3>
                        <button class="btn btn-sm" id="add-admin-btn" style="display: none;" onclick="Admin.showAddAdminModal()">添加管理员</button>
                    </div>
                    
                    <div class="data-table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>用户名</th>
                                    <th>角色</th>
                                    <th>最后登录</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="admins-table-body">
                                <tr>
                                    <td colspan="5" style="text-align: center; color: var(--text-muted);">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 用户详情弹窗 -->
    <div id="user-detail-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>用户详情</h3>
                <div class="modal-close" onclick="Admin.closeUserDetail()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </div>
            </div>
            <div class="modal-body" id="user-detail-body">
                <!-- 动态填充 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Admin.closeUserDetail()">关闭</button>
                <button class="btn" id="toggle-status-btn" onclick="Admin.toggleUserStatus()">切换状态</button>
            </div>
        </div>
    </div>
    
    <!-- 重置密码弹窗 -->
    <div id="reset-password-modal" class="modal-overlay" style="display: none;">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header">
                <h3>重置用户密码</h3>
                <div class="modal-close" onclick="Admin.closeResetPassword()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input type="password" class="form-input" id="reset-password-input" placeholder="请输入新密码（6-20位）">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Admin.closeResetPassword()">取消</button>
                <button class="btn" onclick="Admin.resetPassword()">确认</button>
            </div>
        </div>
    </div>
    
    <!-- 添加管理员弹窗 -->
    <div id="add-admin-modal" class="modal-overlay" style="display: none;">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header">
                <h3>添加管理员</h3>
                <div class="modal-close" onclick="Admin.closeAddAdmin()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="new-admin-username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="new-admin-password" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label class="form-label">角色</label>
                    <select class="form-input" id="new-admin-role">
                        <option value="1">普通管理员</option>
                        <option value="2">超级管理员</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="Admin.closeAddAdmin()">取消</button>
                <button class="btn" onclick="Admin.addAdmin()">确认</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/chat/api/index.php';
        
        const Admin = {
            currentAdmin: null,
            currentMenu: 'dashboard',
            usersPage: 1,
            usersPageSize: 10,
            usersKeyword: '',
            usersStatus: -1,
            selectedUserId: null,
            selectedUser: null,
            
            // 解析endpoint为查询参数
            parseEndpoint(endpoint) {
                const parts = endpoint.replace(/^\//, '').split('/');
                return {
                    module: parts[0] || '',
                    action: parts[1] || ''
                };
            },
            
            async init() {
                // 检查登录状态
                const loggedIn = await this.checkLogin();
                if (loggedIn) {
                    this.showMain();
                } else {
                    this.showLogin();
                }
                
                this.bindEvents();
            },
            
            async checkLogin() {
                try {
                    const res = await this.api('/admin/check_login');
                    if (res.success) {
                        this.currentAdmin = res.data;
                        return true;
                    }
                } catch (e) {
                    console.error('检查登录失败:', e);
                }
                return false;
            },
            
            async api(endpoint, method = 'GET', data = null) {
                const { module, action } = this.parseEndpoint(endpoint);
                const url = API_BASE + '?module=' + module + '&action=' + action;
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                };
                
                if (data && method !== 'GET') {
                    options.body = JSON.stringify(data);
                }
                
                try {
                    const response = await fetch(url, options);
                    const result = await response.json();
                    return result;
                } catch (error) {
                    console.error('API请求失败:', error);
                    throw error;
                }
            },
            
            toast(message, duration = 2000) {
                const existingToast = document.querySelector('.toast');
                if (existingToast) {
                    existingToast.remove();
                }
                
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.remove();
                }, duration);
            },
            
            showLogin() {
                document.getElementById('admin-login-page').style.display = 'block';
                document.getElementById('admin-main-page').style.display = 'none';
            },
            
            showMain() {
                document.getElementById('admin-login-page').style.display = 'none';
                document.getElementById('admin-main-page').style.display = 'flex';
                
                // 更新显示
                if (this.currentAdmin) {
                    document.getElementById('admin-username-display').textContent = this.currentAdmin.username;
                    
                    // 超级管理员显示添加管理员按钮
                    if (this.currentAdmin.role === 2) {
                        document.getElementById('add-admin-btn').style.display = 'block';
                    }
                }
                
                // 加载仪表盘数据
                this.loadDashboard();
            },
            
            bindEvents() {
                // 登录表单
                document.getElementById('admin-login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.login();
                });
                
                // 菜单切换
                document.querySelectorAll('.admin-menu-item').forEach(item => {
                    item.addEventListener('click', () => {
                        this.switchMenu(item.dataset.menu);
                    });
                });
                
                // 搜索回车
                document.getElementById('user-search').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        this.searchUsers();
                    }
                });
            },
            
            async login() {
                const username = document.getElementById('admin-username').value.trim();
                const password = document.getElementById('admin-password').value;
                
                if (!username || !password) {
                    this.toast('请输入用户名和密码');
                    return;
                }
                
                try {
                    const res = await this.api('/admin/login', 'POST', { username, password });
                    if (res.success) {
                        this.currentAdmin = res.data;
                        this.toast('登录成功');
                        setTimeout(() => {
                            this.showMain();
                        }, 500);
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('登录失败');
                }
            },
            
            async logout() {
                try {
                    await this.api('/admin/logout', 'POST');
                    this.toast('已退出');
                    setTimeout(() => {
                        window.location.reload();
                    }, 500);
                } catch (e) {
                    this.toast('退出失败');
                }
            },
            
            switchMenu(menu) {
                this.currentMenu = menu;
                
                // 更新菜单状态
                document.querySelectorAll('.admin-menu-item').forEach(item => {
                    item.classList.toggle('active', item.dataset.menu === menu);
                });
                
                // 更新标题
                const titles = {
                    'dashboard': '仪表盘',
                    'users': '用户管理',
                    'admins': '管理员'
                };
                document.getElementById('page-title').textContent = titles[menu] || '仪表盘';
                
                // 隐藏所有页面
                document.getElementById('dashboard-page').style.display = 'none';
                document.getElementById('users-page').style.display = 'none';
                document.getElementById('admins-page').style.display = 'none';
                
                // 显示目标页面
                const pageId = menu + '-page';
                const page = document.getElementById(pageId);
                if (page) {
                    page.style.display = 'block';
                }
                
                // 加载对应数据
                switch (menu) {
                    case 'dashboard':
                        this.loadDashboard();
                        break;
                    case 'users':
                        this.usersPage = 1;
                        this.loadUsers();
                        break;
                    case 'admins':
                        this.loadAdmins();
                        break;
                }
            },
            
            async loadDashboard() {
                try {
                    const res = await this.api('/admin/dashboard');
                    if (res.success) {
                        const data = res.data;
                        
                        document.getElementById('stat-total-users').textContent = data.total_users;
                        document.getElementById('stat-disabled-users').textContent = data.disabled_users;
                        document.getElementById('stat-total-messages').textContent = data.total_messages;
                        document.getElementById('stat-total-friends').textContent = data.total_friend_pairs;
                        
                        // 渲染统计表格
                        const statsBody = document.getElementById('stats-table-body');
                        if (data.new_users_stats && data.new_users_stats.length > 0) {
                            statsBody.innerHTML = data.new_users_stats.map(item => `
                                <tr>
                                    <td>${item.date}</td>
                                    <td>${item.count}</td>
                                </tr>
                            `).join('');
                        } else {
                            statsBody.innerHTML = `
                                <tr>
                                    <td colspan="2" style="text-align: center; color: var(--text-muted);">暂无数据</td>
                                </tr>
                            `;
                        }
                    }
                } catch (e) {
                    console.error('加载仪表盘失败:', e);
                }
            },
            
            searchUsers() {
                this.usersKeyword = document.getElementById('user-search').value.trim();
                this.usersStatus = parseInt(document.getElementById('user-status-filter').value);
                this.usersPage = 1;
                this.loadUsers();
            },
            
            async loadUsers() {
                try {
                    let url = `/admin/users?page=${this.usersPage}&page_size=${this.usersPageSize}`;
                    if (this.usersKeyword) {
                        url += `&keyword=${encodeURIComponent(this.usersKeyword)}`;
                    }
                    if (this.usersStatus >= 0) {
                        url += `&status=${this.usersStatus}`;
                    }
                    
                    const res = await this.api(url);
                    if (res.success) {
                        this.renderUsers(res.data);
                    }
                } catch (e) {
                    console.error('加载用户失败:', e);
                }
            },
            
            renderUsers(data) {
                const tbody = document.getElementById('users-table-body');
                const pagination = document.getElementById('users-pagination');
                
                if (!data.list || data.list.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" style="text-align: center; color: var(--text-muted);">暂无数据</td>
                        </tr>
                    `;
                    pagination.style.display = 'none';
                    return;
                }
                
                const genderMap = { 0: '保密', 1: '男', 2: '女' };
                
                tbody.innerHTML = data.list.map(user => `
                    <tr>
                        <td><code style="background: var(--bg-tertiary); padding: 2px 8px; border-radius: 4px; font-size: 13px;">${user.user_number}</code></td>
                        <td>${user.nickname || '-'}</td>
                        <td>${user.phone}</td>
                        <td>${genderMap[user.gender] || '未知'}</td>
                        <td>
                            <span class="status-badge ${user.status === 1 ? 'active' : 'disabled'}">
                                ${user.status === 1 ? '正常' : '禁用'}
                            </span>
                        </td>
                        <td>${user.created_at ? new Date(user.created_at).toLocaleDateString('zh-CN') : '-'}</td>
                        <td>
                            <div class="action-btns">
                                <span class="action-btn view" onclick="Admin.viewUserDetail(${user.id})">详情</span>
                                <span class="action-btn toggle ${user.status === 1 ? 'disable' : ''}" onclick="Admin.toggleUserStatusDirect(${user.id}, ${user.status})">
                                    ${user.status === 1 ? '禁用' : '启用'}
                                </span>
                            </div>
                        </td>
                    </tr>
                `).join('');
                
                // 更新分页
                pagination.style.display = 'flex';
                document.getElementById('users-total').textContent = data.total;
                
                // 生成分页按钮
                this.renderPagination(data.total, data.page, data.page_size, 'users-pagination-buttons');
            },
            
            renderPagination(total, currentPage, pageSize, containerId) {
                const container = document.getElementById(containerId);
                if (!container) return;
                
                const totalPages = Math.ceil(total / pageSize);
                if (totalPages <= 1) {
                    container.innerHTML = '';
                    return;
                }
                
                let buttons = '';
                
                // 上一页
                buttons += `<button class="pagination-btn" onclick="Admin.goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;
                
                // 页码按钮（简化处理）
                const maxVisiblePages = 5;
                let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
                let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
                
                if (endPage - startPage < maxVisiblePages - 1) {
                    startPage = Math.max(1, endPage - maxVisiblePages + 1);
                }
                
                if (startPage > 1) {
                    buttons += `<button class="pagination-btn" onclick="Admin.goToPage(1)">1</button>`;
                    if (startPage > 2) {
                        buttons += `<span style="padding: 0 8px; color: var(--text-muted);">...</span>`;
                    }
                }
                
                for (let i = startPage; i <= endPage; i++) {
                    buttons += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="Admin.goToPage(${i})">${i}</button>`;
                }
                
                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) {
                        buttons += `<span style="padding: 0 8px; color: var(--text-muted);">...</span>`;
                    }
                    buttons += `<button class="pagination-btn" onclick="Admin.goToPage(${totalPages})">${totalPages}</button>`;
                }
                
                // 下一页
                buttons += `<button class="pagination-btn" onclick="Admin.goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
                
                container.innerHTML = buttons;
            },
            
            goToPage(page) {
                this.usersPage = page;
                this.loadUsers();
            },
            
            async viewUserDetail(userId) {
                this.selectedUserId = userId;
                
                try {
                    const res = await this.api(`/admin/user_detail?user_id=${userId}`);
                    if (res.success) {
                        this.selectedUser = res.data;
                        this.renderUserDetail(res.data);
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('加载失败');
                }
            },
            
            renderUserDetail(user) {
                const body = document.getElementById('user-detail-body');
                const genderMap = { 0: '保密', 1: '男', 2: '女' };
                
                body.innerHTML = `
                    <div class="detail-row">
                        <div class="detail-label">用户号码</div>
                        <div class="detail-value"><code style="background: var(--bg-tertiary); padding: 2px 8px; border-radius: 4px;">${user.user_number}</code></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">昵称</div>
                        <div class="detail-value">${user.nickname || '-'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">手机号</div>
                        <div class="detail-value">${user.phone}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">性别</div>
                        <div class="detail-value">${genderMap[user.gender] || '未知'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">简介</div>
                        <div class="detail-value">${user.bio || '-'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">状态</div>
                        <div class="detail-value">
                            <span class="status-badge ${user.status === 1 ? 'active' : 'disabled'}">
                                ${user.status === 1 ? '正常' : '禁用'}
                            </span>
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">好友数</div>
                        <div class="detail-value">${user.friend_count || 0}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">消息数</div>
                        <div class="detail-value">${user.message_count || 0}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">最后登录</div>
                        <div class="detail-value">${user.last_login ? new Date(user.last_login).toLocaleString('zh-CN') : '-'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">注册时间</div>
                        <div class="detail-value">${user.created_at ? new Date(user.created_at).toLocaleString('zh-CN') : '-'}</div>
                    </div>
                `;
                
                // 更新按钮文字
                const toggleBtn = document.getElementById('toggle-status-btn');
                toggleBtn.textContent = user.status === 1 ? '禁用用户' : '启用用户';
                
                document.getElementById('user-detail-modal').style.display = 'flex';
            },
            
            closeUserDetail() {
                document.getElementById('user-detail-modal').style.display = 'none';
                this.selectedUserId = null;
                this.selectedUser = null;
            },
            
            async toggleUserStatus() {
                if (!this.selectedUser) return;
                
                const newStatus = this.selectedUser.status === 1 ? 0 : 1;
                
                try {
                    const res = await this.api('/admin/update_user_status', 'POST', {
                        user_id: this.selectedUser.id,
                        status: newStatus
                    });
                    
                    if (res.success) {
                        this.toast(res.message);
                        this.closeUserDetail();
                        this.loadUsers();
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('操作失败');
                }
            },
            
            async toggleUserStatusDirect(userId, currentStatus) {
                const newStatus = currentStatus === 1 ? 0 : 1;
                
                try {
                    const res = await this.api('/admin/update_user_status', 'POST', {
                        user_id: userId,
                        status: newStatus
                    });
                    
                    if (res.success) {
                        this.toast(res.message);
                        this.loadUsers();
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('操作失败');
                }
            },
            
            showResetPassword(userId) {
                this.selectedUserId = userId;
                document.getElementById('reset-password-input').value = '';
                document.getElementById('reset-password-modal').style.display = 'flex';
            },
            
            closeResetPassword() {
                document.getElementById('reset-password-modal').style.display = 'none';
                this.selectedUserId = null;
            },
            
            async resetPassword() {
                const newPassword = document.getElementById('reset-password-input').value;
                
                if (!newPassword) {
                    this.toast('请输入新密码');
                    return;
                }
                
                if (newPassword.length < 6 || newPassword.length > 20) {
                    this.toast('密码长度应在6-20个字符之间');
                    return;
                }
                
                try {
                    const res = await this.api('/admin/reset_user_password', 'POST', {
                        user_id: this.selectedUserId,
                        new_password: newPassword
                    });
                    
                    if (res.success) {
                        this.toast('密码重置成功');
                        this.closeResetPassword();
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('操作失败');
                }
            },
            
            async loadAdmins() {
                try {
                    const res = await this.api('/admin/admins');
                    if (res.success) {
                        this.renderAdmins(res.data);
                    }
                } catch (e) {
                    console.error('加载管理员失败:', e);
                }
            },
            
            renderAdmins(admins) {
                const tbody = document.getElementById('admins-table-body');
                const roleMap = { 1: '普通管理员', 2: '超级管理员' };
                
                if (!admins || admins.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-muted);">暂无数据</td>
                        </tr>
                    `;
                    return;
                }
                
                tbody.innerHTML = admins.map(admin => `
                    <tr>
                        <td>${admin.username}</td>
                        <td>
                            <span class="status-badge ${admin.role === 2 ? 'active' : ''}">
                                ${roleMap[admin.role] || '未知'}
                            </span>
                        </td>
                        <td>${admin.last_login ? new Date(admin.last_login).toLocaleString('zh-CN') : '-'}</td>
                        <td>${admin.created_at ? new Date(admin.created_at).toLocaleString('zh-CN') : '-'}</td>
                        <td>
                            <div class="action-btns">
                                ${admin.role !== 2 && this.currentAdmin && this.currentAdmin.role === 2 ? `
                                    <span class="action-btn toggle disable" onclick="Admin.deleteAdmin(${admin.id}, '${admin.username}')">删除</span>
                                ` : ''}
                            </div>
                        </td>
                    </tr>
                `).join('');
            },
            
            showAddAdminModal() {
                document.getElementById('new-admin-username').value = '';
                document.getElementById('new-admin-password').value = '';
                document.getElementById('new-admin-role').value = '1';
                document.getElementById('add-admin-modal').style.display = 'flex';
            },
            
            closeAddAdmin() {
                document.getElementById('add-admin-modal').style.display = 'none';
            },
            
            async addAdmin() {
                const username = document.getElementById('new-admin-username').value.trim();
                const password = document.getElementById('new-admin-password').value;
                const role = parseInt(document.getElementById('new-admin-role').value);
                
                if (!username || !password) {
                    this.toast('请填写完整信息');
                    return;
                }
                
                if (username.length < 2 || username.length > 20) {
                    this.toast('用户名长度应在2-20个字符之间');
                    return;
                }
                
                if (password.length < 6 || password.length > 20) {
                    this.toast('密码长度应在6-20个字符之间');
                    return;
                }
                
                try {
                    const res = await this.api('/admin/add_admin', 'POST', {
                        username,
                        password,
                        role
                    });
                    
                    if (res.success) {
                        this.toast('添加成功');
                        this.closeAddAdmin();
                        this.loadAdmins();
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('添加失败');
                }
            },
            
            async deleteAdmin(adminId, username) {
                if (!confirm(`确定要删除管理员 "${username}" 吗？`)) {
                    return;
                }
                
                try {
                    const res = await this.api('/admin/delete_admin', 'POST', {
                        admin_id: adminId
                    });
                    
                    if (res.success) {
                        this.toast('删除成功');
                        this.loadAdmins();
                    } else {
                        this.toast(res.message);
                    }
                } catch (e) {
                    this.toast('删除失败');
                }
            }
        };
        
        document.addEventListener('DOMContentLoaded', () => {
            Admin.init();
        });
    </script>
</body>
</html>
